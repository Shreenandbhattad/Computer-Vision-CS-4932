<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CS-4912 — Assignment 1</title>

  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* keep your existing CSS visually unchanged (trimmed here for brevity) */
    :root { --bg:#fafbfd; --card:#fff; --text:#0f1419; --muted:#536471; --accent:#1d4ed8; --accent-light:#3b82f6; --border:#e5e7eb; --radius:12px; --maxw:1080px;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui; background:var(--bg); color:var(--text); padding:28px; }
    .container{max-width:var(--maxw);margin:0 auto}
    /* ... (use the same CSS you already have) ... */
    /* small placements for sign-in */
    #gsi-button { display:inline-block; margin-left:12px; vertical-align:middle; }
    .signed { font-size:14px; color:var(--muted); margin-left:8px; }
  </style>
</head>
<body>
  <div class="container">
    <header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-weight:600;font-size:18px">Assignment 1: Photography & Perspective</div>
        <div style="color:var(--muted);font-size:13px">Shreenand Bhattad • CS-4912 • Spring 2026</div>
      </div>

      <div id="auth-area">
        <!-- GIS renders a button in #gsi-button when CLIENT_ID provided -->
        <div id="gsi-button"></div>
        <span id="signed" class="signed"></span>
        <button id="signout" style="display:none;margin-left:10px;" onclick="signOut()">Sign out</button>
      </div>
    </header>

    <!-- (KEEP the rest of your page exactly as you want: photos, explanation, modal, etc) -->
    <!-- For brevity I include only the voting buttons and the photo cards for Part 3 which you asked about earlier -->
    <main>
      <!-- copy over your section markup — here's Part 3 as an example; the rest of the page stays identical -->
      <section class="section" data-section="3" style="background:var(--card);padding:20px;border-radius:12px;border:1px solid var(--border);">
        <h2>Part 03 — Projection Types</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
          <div class="photo-card">
            <div class="photo-wrapper" style="height:260px;overflow:hidden;background:#f3f4f6;position:relative;">
              <div class="photo-label" style="position:absolute;left:12px;top:12px">Perspective</div>
              <button class="fit-toggle" title="Toggle fit mode" style="position:absolute;right:10px;top:10px">↔</button>
              <img src="Photo5.png" alt="Perspective" style="width:100%;height:100%;object-fit:cover;display:block">
            </div>
          </div>
          <div class="photo-card">
            <div class="photo-wrapper" style="height:260px;overflow:hidden;background:#f3f4f6;position:relative;">
              <div class="photo-label" style="position:absolute;left:12px;top:12px">Orthographic</div>
              <button class="fit-toggle" title="Toggle fit mode" style="position:absolute;right:10px;top:10px">↔</button>
              <img src="Photo6.png" alt="Orthographic" style="width:100%;height:100%;object-fit:cover;display:block">
            </div>
          </div>
        </div>

        <div class="vote-section" style="margin-top:18px;display:flex;gap:12px;align-items:center;justify-content:center">
          <button class="vote-btn upvote" id="up-3" onclick="vote(3,'up')">Upvote</button>
          <div class="vote-count" id="votes-3">0 votes</div>
          <button class="vote-btn downvote" id="down-3" onclick="vote(3,'down')">Downvote</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    // CONFIG — replace these:
    const WEBAPP_URL = 'https://script.google.com/a/macros/ashoka.edu.in/s/AKfycbz_WLzWgPcC5tbCnqs7wihBUjrw8zHlRzdS3GbjN3HdTLk_W2tSrVKSh9cKJV2pUvEEcQ/exec'; // <-- set your webapp URL
    const CLIENT_ID = 'YOUR_OAUTH_CLIENT_ID.apps.googleusercontent.com'; // <-- optional but recommended

    // internal state
    let idToken = null;
    let signedEmail = null;

    // Build request url for counts (GET)
    function webappUrl() {
      return WEBAPP_URL;
    }

    // FETCH counts (public)
    async function fetchCounts() {
      try {
        const res = await fetch(webappUrl(), { method: 'GET' });
        const j = await res.json();
        if (j && j.success && j.counts) {
          updateDisplay(3, j.counts); // call for each section you use
        }
      } catch (err) {
        console.warn('fetchCounts error', err);
      }
    }

    function updateDisplay(section, counts) {
      if (!counts) return;
      const cnt = (counts && counts[String(section)]) ? counts[String(section)] : 0;
      const text = Math.abs(cnt) === 1 ? 'vote' : 'votes';
      const el = document.getElementById(`votes-${section}`);
      if (el) el.textContent = `${cnt} ${text}`;
    }

    // HANDLE VOTE: send id_token in POST body
    async function sendVoteToServer(section, type) {
      // require idToken (if CLIENT_ID provided, use GIS flow)
      if (!idToken) {
        // open webapp auth page so user can sign in (fallback)
        const popup = window.open(webappUrl() + '?auth=1', '_blank', 'width=600,height=700');
        alert('Please sign in using the page that opened, then click vote again.');
        return { success: false, error: 'not_signed_in' };
      }

      try {
        const res = await fetch(webappUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ section: String(section), type: String(type), id_token: idToken })
        });
        const j = await res.json();
        return j;
      } catch (err) {
        console.error('sendVote error', err);
        return { success: false, error: 'network' };
      }
    }

    async function vote(section, type) {
      // simple UI disable
      document.getElementById(`up-${section}`).disabled = true;
      document.getElementById(`down-${section}`).disabled = true;

      const result = await sendVoteToServer(section, type);
      if (result && result.success) {
        updateDisplay(section, result.counts || {});
        alert('Thanks — your vote was recorded.');
        return;
      }

      if (result && result.error === 'already_voted') {
        updateDisplay(section, result.counts || {});
        alert('Our records show you already voted.');
        document.getElementById(`up-${section}`).disabled = true;
        document.getElementById(`down-${section}`).disabled = true;
        return;
      }

      if (result && result.error === 'forbidden_domain') {
        alert('Voting restricted to class (ashoka.edu.in) accounts.');
        return;
      }

      if (result && result.error === 'not_signed_in') {
        alert('You need to sign in first. Use the sign-in button at top-left.');
        // re-enable
        document.getElementById(`up-${section}`).disabled = false;
        document.getElementById(`down-${section}`).disabled = false;
        return;
      }

      alert('Vote failed: ' + (result && result.error ? result.error : 'network'));
      document.getElementById(`up-${section}`).disabled = false;
      document.getElementById(`down-${section}`).disabled = false;
    }

    /* --------------------------
       Google Identity Services (GIS) setup
       -------------------------- */
    function handleCredentialResponse(response) {
      // response.credential is the ID token
      if (response && response.credential) {
        idToken = response.credential;
        // decode email for UI only (not strictly needed)
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        signedEmail = payload.email;
        document.getElementById('signed').textContent = 'Signed in: ' + signedEmail;
        document.getElementById('signout').style.display = 'inline-block';
      }
    }

    function initGis() {
      if (!CLIENT_ID || CLIENT_ID.includes('YOUR_OAUTH_CLIENT_ID')) {
        // CLIENT_ID not set - don't render GIS button; show minimal instruction
        document.getElementById('gsi-button').innerHTML = '<small style="color:var(--muted)">Sign-in disabled (set CLIENT_ID in page).</small>';
        return;
      }
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
      });
      google.accounts.id.renderButton(
        document.getElementById('gsi-button'),
        { theme: 'outline', size: 'medium', width: 160 }
      );
      // optional: prompt one-tap (commented)
      // google.accounts.id.prompt();
    }

    function signOut() {
      idToken = null;
      signedEmail = null;
      document.getElementById('signed').textContent = '';
      document.getElementById('signout').style.display = 'none';
      // can't explicitly revoke ID token client-side; but we can remove local state.
      // prompt account chooser again next sign-in
      if (CLIENT_ID && google && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
      }
    }

    // init
    window.addEventListener('DOMContentLoaded', () => {
      initGis();
      fetchCounts();
    });
  </script>
</body>
</html>
